services:
  database:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: scafera
      MYSQL_USER: scafera
      MYSQL_PASSWORD: scafera
    volumes:
      - database_data:/var/lib/mysql
    # Uncomment to access the database from the host (e.g. GUI client)
    # ports:
    #   - "3306:3306"

  app:
    build: .
    depends_on:
      - database
    volumes:
      - .:/app
    working_dir: /app
    ports:
      - "8000:8000"
    command: php -S 0.0.0.0:8000 -t public

volumes:
  database_data:
